<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FashionWeb - Đăng nhập</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="brand">THỜI TRANG</div>
    <nav class="main-nav">
      <a href="index.html">Trang chủ</a>
      <a href="news.html">Tin tức</a>
      <a href="detail.html">Chi tiết</a>
      <a href="comment.html">Phản hồi</a>
      <a href="login.html" class="active">Đăng nhập</a>
    </nav>
  </header>

  <main class="container">

    <div class="login-box">
      <h1>🔐 Đăng nhập thành viên</h1>
      <p>Đăng nhập để truy cập nội dung độc quyền và tham gia cộng đồng thời trang.</p>

      <form class="login-form" id=\"loginForm\">
        <label for=\"username\">Tên đăng nhập:</label>
        <input type="text" id=\"username\" name=\"username\" placeholder="Nhập tên đăng nhập">

        <label for="password">Mật khẩu:</label>
        <input type="password" id="password" name="password" placeholder="Nhập mật khẩu">

        <div class="login-options">
          <label><input type="checkbox" id="remember"> Ghi nhớ đăng nhập</label>
          <a href="#">Quên mật khẩu?</a>
        </div>

        <p id="loginMsg"></p>
        <input type="submit" value="Đăng nhập">
      </form>
    </div>

  </main>

  <footer class="site-footer">
    <p>&copy; 2025 FashionWeb. Thiết kế cho bài tập xây dựng Website thời trang.</p>
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
